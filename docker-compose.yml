services:
  postgres:
    image: postgres:17.6-alpine
    environment:
      POSTGRES_DB: anklo_os
      POSTGRES_USER: anklo
      POSTGRES_PASSWORD: local-development-only
    ports:
      - "5432:5432"
    volumes:
      - anklo_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  anklo_postgres_data:
